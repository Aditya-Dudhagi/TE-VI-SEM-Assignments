<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>
    <link rel="stylesheet" href="style.css">
    
    
    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .gallery img {
            width: 100%;
            border-radius: 12px;
            transition: transform 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        .caption {
            text-align: center;
            margin-top: 8px;
            font-weight: bold;
            color: #2b2b2b;
        }
    </style>
</head>
<body>

<header>
    <div class="navbar">
        <div class="logo">Food Palace</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contactus.html">Contact</a></li>
        </ul>
    </div>
</header>

<section>
    <h1>Gallery</h1>
    <p>Take a look at our delicious dishes and cozy restaurant interiors.</p>

    <div class="gallery">
        <div>
            <img src="images/img1.jpg" alt="Delicious Dish 1">
        </div>
        <div>
            <img src="images/img2.jpg" alt="Delicious Dish 2">
        </div>
        <div>
            <img src="images/img3.jpg" alt="Delicious Dish 3">
        </div>
        <div>
            <img src="images/img4.jpg" alt="Restaurant Interior">
        </div>
        <div>
            <img src="images/img5.jpg" alt="Dish 5">
        </div>
        <div>
            <img src="images/img6.jpg" alt="Dish 6">
        </div>
        <div>
            <img src="images/chinese dish.webp" alt="Dish 7">
        </div>
        <div>
            <img src="images/menus.jpeg" alt="Dish 7">
        </div>
    </div>
</section>

</body>
</html>
