<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tweet Sentiment Analyzer</title>
    <!-- Use a modern, premium font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path>
                </svg>
            </div>
            <h1>TweetAnalyzer</h1>
        </header>

        <main>
            <div class="glass-card main-card">
                <h2>Analyze Sentiment</h2>
                <p class="subtitle">Paste any tweet below to determine if it carries a positive or negative sentiment utilizing our Naive Bayes Machine Learning model.</p>
                
                <form id="analyze-form">
                    <div class="input-group">
                        <textarea id="tweet-input" placeholder="What's happening?" rows="4" required></textarea>
                    </div>
                    
                    <button type="submit" id="submit-btn" class="glow-btn">
                        <span>Analyze Sentiment</span>
                        <div class="spinner d-none" id="loader"></div>
                    </button>
                </form>
            </div>

            <div class="glass-card result-card d-none" id="result-container">
                <div class="result-header">
                    <h3>Classification Result</h3>
                </div>
                <div class="sentiment-box" id="sentiment-box">
                    <span id="sentiment-icon"></span>
                    <h2 id="sentiment-text">...</h2>
                </div>
                <div class="confidence-bar-container">
                    <div class="confidence-label">
                        <span>Confidence</span>
                        <span id="confidence-value">0%</span>
                    </div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" id="confidence-fill"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
